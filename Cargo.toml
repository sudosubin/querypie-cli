[package]
name = "querypie"
version = "0.1.0"
edition = "2021"

[features]
default = []

[dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive", "env"] }
dirs = "5"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"

[[bin]]
name = "querypie"
path = "src/main.rs"
