- name: Install Linux build dependencies
  if: ${{ matrix.container }}
  run: |
    apt-get update
    apt-get install -y --no-install-recommends \
      cmake \
      libayatana-appindicator3-dev \
      libgtk-3-dev \
      librsvg2-dev \
      libssl-dev \
      libwebkit2gtk-4.1-dev \
      patchelf
