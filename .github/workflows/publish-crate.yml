name: Publish to crates.io

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-crate:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        run: |
          set +e
          output=$(cargo publish --locked --no-verify 2>&1)
          status=$?
          printf '%s\n' "$output"
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if printf '%s\n' "$output" | grep -Eiq 'already uploaded|already exists|previously uploaded|crate version.*already'; then
            exit 0
          fi

          exit "$status"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
